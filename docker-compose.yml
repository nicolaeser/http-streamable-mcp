services:
  mcp:
    image: ghcr.io/nicolaeser/http-streamable-mcp:latest
    container_name: http-streamable-mcp
    depends_on:
      - redis
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      PUBLIC_BASE_URL: "http://localhost:3000"
      SERVER_NAME: "http-streamable-mcp"
      SESSION_TTL_MS: "1800000"
      AUTH_MODE: "bearer"
      API_KEY: "change-me-in-production"
      LOGGING_MODE: "none"
      REDIS_URL: "redis://redis:6379"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_CLIENT_ID_HEADER: "x-client-id"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/internal-api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: http-streamable-mcp-redis
    restart: unless-stopped
